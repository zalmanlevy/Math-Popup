<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Math Popup</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="title-bar">
    <div class="drag-handle"></div>
    <div class="left-actions">
      <button id="tabs-btn" class="icon-btn" title="Tabs (Ctrl+T for new)">📄</button>
      <button id="archive-btn" class="icon-btn" title="Recently Closed">🕒</button>
      <button id="mode-toggle-btn" class="icon-btn" title="Mode: Math">∑</button>
    </div>
    <div class="title-spacer"></div>
    <div class="actions">
      <button id="toggle-pin" title="Stay on top" class="icon-btn" aria-pressed="false">📌</button>
      <button id="show-vars" title="Variables" class="icon-btn vars-btn" aria-haspopup="true">ƒ</button>
      <button id="open-help" title="Help" class="icon-btn">?</button>
      <button id="open-settings" title="Settings" class="icon-btn">⚙</button>
      <button id="close-window" title="Close" class="icon-btn close">×</button>
    </div>
    <div id="tabs-popup" class="vars-popup" hidden></div>
    <div id="archive-popup" class="vars-popup" hidden></div>
    <div id="vars-popup" class="vars-popup" hidden></div>
  </header>
  <main class="editor-shell">
    <div id="line-gutter" class="line-gutter" aria-hidden="true"></div>
    <div class="editor-stack">
      <pre id="syntax-overlay" class="syntax-overlay" aria-hidden="true"></pre>
      <textarea id="editor"
                class="editor"
                spellcheck="false"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                wrap="soft"></textarea>
      <div id="measure" class="measure" aria-hidden="true"></div>
    </div>
    <div id="result-gutter" class="result-gutter" aria-hidden="true"></div>
  </main>
  <div id="cmd-menu" class="cmd-menu" role="listbox" aria-hidden="true" hidden></div>
  <div id="signature-tooltip" class="signature-tooltip" hidden></div>
  <div id="hover-tooltip" class="hover-tooltip" hidden></div>
  <footer class="status-bar">
    <span id="status-msg" class="status-msg">Ready</span>
    <span id="page-indicator" class="hint">Page 1</span>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
